services:
  # ==================== HDFS Services ====================
  namenode:
    build:
      context: .
      dockerfile: dockerfile
    container_name: namenode
    hostname: namenode
    networks:
      - hadoop-network
    ports:
      - "9870:9870"  # Web UI
      - "9000:9000"  # IPC
      - "8020:8020"  # FileSystem
    environment:
      - CLUSTER_NAME=hadoop-cluster
    volumes:
      - namenode-data:/hadoop/dfs/name
      - ./hadoop_config:/opt/hadoop/etc/hadoop:ro
    command: ["/bin/bash", "/scripts/start-hdfs.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -L -f http://localhost:9870 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  datanode1:
    build:
      context: .
      dockerfile: dockerfile
    container_name: datanode1
    hostname: datanode1
    networks:
      - hadoop-network
    ports:
      - "9864:9864"  # Web UI
      - "9866:9866"  # Data transfer
    environment:
      - CLUSTER_NAME=hadoop-cluster
    volumes:
      - datanode1-data:/hadoop/dfs/data
      - ./hadoop_config:/opt/hadoop/etc/hadoop:ro
    depends_on:
      namenode:
        condition: service_healthy
    command: ["/bin/bash", "/scripts/init-datanode.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9864"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  datanode2:
    build:
      context: .
      dockerfile: dockerfile
    container_name: datanode2
    hostname: datanode2
    networks:
      - hadoop-network
    ports:
      - "9865:9864"  # Web UI
      - "9867:9866"  # Data transfer
    environment:
      - CLUSTER_NAME=hadoop-cluster
    volumes:
      - datanode2-data:/hadoop/dfs/data
      - ./hadoop_config:/opt/hadoop/etc/hadoop:ro
    depends_on:
      namenode:
        condition: service_healthy
    command: ["/bin/bash", "/scripts/init-datanode.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9864"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== YARN Services ====================
  resourcemanager:
    build:
      context: .
      dockerfile: dockerfile
    container_name: resourcemanager
    hostname: resourcemanager
    networks:
      - hadoop-network
    ports:
      - "8088:8088"  # Web UI
      - "8030:8030"  # Scheduler
      - "8031:8031"  # Resource Tracker
      - "8032:8032"  # ApplicationMaster
    environment:
      - CLUSTER_NAME=hadoop-cluster
    volumes:
      - ./hadoop_config:/opt/hadoop/etc/hadoop:ro
    depends_on:
      namenode:
        condition: service_healthy
    command: ["/bin/bash", "/scripts/start-yarn.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/ws/v1/cluster/info || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  nodemanager:
    build:
      context: .
      dockerfile: dockerfile
    container_name: nodemanager
    hostname: nodemanager
    networks:
      - hadoop-network
    ports:
      - "8042:8042"  # Web UI
      - "8040:8040"  # Localizer
    environment:
      - CLUSTER_NAME=hadoop-cluster
    volumes:
      - ./hadoop_config:/opt/hadoop/etc/hadoop:ro
    depends_on:
      resourcemanager:
        condition: service_healthy
    command: ["/bin/bash", "/scripts/start-nodemanager.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8042/node || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== Hive Services ====================
  hive-metastore-db:
    image: mysql:8.0
    container_name: hive-metastore-db
    hostname: hive-metastore-db
    networks:
      - hadoop-network
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: metastore
      MYSQL_USER: hive
      MYSQL_PASSWORD: hivepassword
    volumes:
      - hive-metastore-db-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  hive-metastore:
    build:
      context: .
      dockerfile: dockerfile
    container_name: hive-metastore
    hostname: hive-metastore
    networks:
      - hadoop-network
    ports:
      - "9083:9083"
    environment:
      - CLUSTER_NAME=hadoop-cluster
      - HADOOP_HOME=/opt/hadoop
      - HIVE_HOME=/opt/hive
      - PATH=/opt/hadoop/bin:/opt/hive/bin:$PATH
    volumes:
      - ./hive/conf:/opt/hive/conf:ro
      - ./hadoop_config:/opt/hadoop/etc/hadoop:ro
    depends_on:
      namenode:
        condition: service_healthy
      hive-metastore-db:
        condition: service_healthy
    entrypoint: []
    command:
      - /bin/bash
      - -c
      - |
        export PATH=/opt/hadoop/bin:/opt/hive/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        until /usr/bin/nc -z hive-metastore-db 3306; do echo 'Waiting for MySQL...'; /usr/bin/sleep 2; done
        echo 'Initializing schema...'
        /opt/hive/bin/schematool -dbType mysql -initSchema 2>/dev/null || echo 'Schema exists'
        echo 'Starting Hive Metastore...'
        exec /opt/hive/bin/hive --service metastore
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9083"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  hiveserver2:
    build:
      context: .
      dockerfile: dockerfile
    container_name: hiveserver2
    hostname: hiveserver2
    networks:
      - hadoop-network
    ports:
      - "10000:10000"  # Thrift server
      - "10002:10002"  # Web UI
    environment:
      - CLUSTER_NAME=hadoop-cluster
      - HADOOP_HOME=/opt/hadoop
      - HIVE_HOME=/opt/hive
      - PATH=/opt/hadoop/bin:/opt/hive/bin:$PATH
    volumes:
      - ./hive/conf:/opt/hive/conf:ro
      - ./hadoop_config:/opt/hadoop/etc/hadoop:ro
    depends_on:
      hive-metastore:
        condition: service_healthy
    entrypoint: []
    command:
      - /bin/bash
      - -c
      - |
        export PATH=/opt/hadoop/bin:/opt/hive/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        echo 'Starting HiveServer2...'
        exec /opt/hive/bin/hiveserver2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10002"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== Kafka Services ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    hostname: zookeeper
    networks:
      - hadoop-network
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q Mode || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    hostname: kafka
    networks:
      - hadoop-network
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    hostname: kafka-ui
    networks:
      - hadoop-network
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==================== Airflow Services ====================
  postgres:
    image: postgres:14-alpine
    container_name: postgres
    hostname: postgres
    networks:
      - hadoop-network
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow
    hostname: airflow
    networks:
      - hadoop-network
    ports:
      - "8081:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=UKMzEm3yIuFYEq1y3-2FxPNWSVwRASpahmQ9kQfEr8E=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=airflow_secret_key
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
      - AIRFLOW__CORE__ENABLE_XCOM_PICKLING=True
      - AIRFLOW_CONN_HDFS_DEFAULT=hdfs://namenode:9000
      - AIRFLOW_CONN_HIVE_CLI_DEFAULT=hive_cli://hiveserver2:10000
      - AIRFLOW_CONN_KAFKA_DEFAULT=kafka://kafka:9092
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    volumes:
      - ./src/dags_demo:/opt/airflow/dags
      - ./airflow/airflow.cfg:/opt/airflow/airflow.cfg:ro
      - airflow-logs:/opt/airflow/logs
      - airflow-plugins:/opt/airflow/plugins
    depends_on:
      postgres:
        condition: service_healthy
      namenode:
        condition: service_healthy
      hive-metastore:
        condition: service_healthy
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        airflow db init &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true &&
        echo 'Starting Airflow webserver and scheduler...' &&
        airflow webserver --port 8080 & airflow scheduler
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

networks:
  hadoop-network:
    driver: bridge
    name: hadoop-network

volumes:
  namenode-data:
    name: namenode-data
  datanode1-data:
    name: datanode1-data
  datanode2-data:
    name: datanode2-data
  hive-metastore-db-data:
    name: hive-metastore-db-data
  zookeeper-data:
    name: zookeeper-data
  zookeeper-logs:
    name: zookeeper-logs
  kafka-data:
    name: kafka-data
  airflow-logs:
    name: airflow-logs
  airflow-plugins:
    name: airflow-plugins
  postgres-data:
    name: postgres-data